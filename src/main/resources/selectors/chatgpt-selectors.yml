# ============================================================================
# ChatGPT (chatgpt.com) 页面元素选择器
# ChatGPT 使用 ProseMirror 编辑器，input 选择器需要适配
# ============================================================================

platform: chatgpt
selectors:
  # 输入框（ProseMirror contenteditable div）
  input: "#prompt-textarea"
  input-fallback: "div.ProseMirror[contenteditable='true']"
  # 发送按钮
  submit: "button[data-testid='send-button']"
  submit-fallback: "button[aria-label='Send prompt']"
  # 响应区域
  response-container: "div[data-message-author-role='assistant']"
  latest-response: "article[data-testid^='conversation-turn-']:last-of-type div[data-message-author-role='assistant']"
  # 已登录标识
  login-indicator: "button[data-testid='profile-button']"
  login-indicator-fallback: "nav[aria-label='ChatGPT']"
  # 响应完成标识（最后一条回复的复制按钮出现 = 生成完毕）
  response-wait-indicator: "article[data-testid^='conversation-turn-']:last-of-type button[data-testid='copy-turn-action-button']"
  # 复制回答按钮（用于剪贴板提取，限定最后一条回复）
  copy-response: "article[data-testid^='conversation-turn-']:last-of-type button[data-testid='copy-turn-action-button']"
  copy-response-fallback: "article[data-testid^='conversation-turn-']:last-of-type div[data-message-author-role='assistant'] button[data-testid='copy-turn-action-button']"
  # 停止生成按钮
  stop-generating: "button[data-testid='stop-button']"
  stop-generating-fallback: "button[aria-label='Stop generating']"
  # 新建对话按钮
  new-chat: "button[data-testid='new-chat-button']"
  new-chat-fallback: "a[href='/']"
  # 等待超时配置
  timeouts:
    page-load: 15000
    input-ready: 10000
    response-complete: 120000
    indicator-wait: 8000
